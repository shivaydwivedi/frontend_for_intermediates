name: Documentation checks

on:
  pull_request:
    paths:
      - "**/*.md"
      - ".github/workflows/documentation-checks.yml"
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - ".github/workflows/documentation-checks.yml"

jobs:
  markdown-smoke-check:
    name: Markdown smoke check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify required documentation files
        shell: bash
        run: |
          set -euo pipefail
          required=(
            "README.md"
            "ROADMAP.md"
            "AGENTS.md"
            "CLAUDE.md"
            "CONTRIBUTING.md"
            "docs/accessibility-standards.md"
            "docs/api-and-security-guidelines.md"
            "docs/architecture-guidelines.md"
            "docs/deployment-guide.md"
            "docs/learning-path.md"
            "docs/project-standards.md"
            "docs/testing-standards.md"
            "docs/tooling-guide.md"
          )

          for file in "${required[@]}"; do
            test -s "$file"
          done

      - name: Check for forbidden Day 0 claims
        shell: bash
        run: |
          set -euo pipefail
          if grep -RInE "live demo|deployed at|production URL|preview\.png" README.md ROADMAP.md docs .github/ISSUE_TEMPLATE .github/PULL_REQUEST_TEMPLATE.md | grep -v "No project implementation" | grep -v "Do not" | grep -v "only after" | grep -v "unless" | grep -v "where relevant"; then
            echo "Found possible unverified demo, deployment, or preview claim."
            exit 1
          fi
